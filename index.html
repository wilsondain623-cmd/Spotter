<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0E18">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spotter">
<title>Spotter — Dwil Fitness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --obsidian:#0A0E18; --panel:#111726; --panel2:#161e30; --line:#232c42;
  --steel:#4D7DB4; --ice:#A8C4E0; --deep:#2C4F7A;
  --text:#F4F4F5; --muted:#CFD3DC; --dim:#8b93a5;
  --ok:#5fb48a; --warn:#d4a04d; --hot:#c95f5f;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--obsidian);color:var(--text);font-family:Manrope,Poppins,system-ui,sans-serif}
body{min-height:100vh;padding-top:env(safe-area-inset-top,0px);padding-bottom:calc(40px + env(safe-area-inset-bottom,0px))}
#app{max-width:560px;margin:0 auto;padding:0 16px}
header{display:flex;align-items:center;gap:10px;padding:18px 2px 14px}
header .word{font-family:Poppins,Manrope,sans-serif;font-size:18px;letter-spacing:.2px}
header .word b{font-weight:700}
header .word span{font-weight:500;color:var(--ice)}
header .sub{margin-left:auto;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px}
h2{font-size:15px;font-weight:700;color:var(--ice);margin:18px 0 10px;letter-spacing:.3px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--deep),var(--steel));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;flex-shrink:0}
.cname{font-weight:700;font-size:16px}
.csub{font-size:12px;color:var(--dim);margin-top:2px}
.chip{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
.chip.hot{color:#f0b8b8;border-color:#5a3535}
.chip.fresh{color:#b9e0cb;border-color:#2e4d3c}
button{font-family:inherit;font-size:14px;font-weight:700;border:none;border-radius:12px;cursor:pointer}
.btn{background:var(--steel);color:#fff;padding:12px 18px;width:100%}
.btn:active{background:var(--deep)}
.btn2{background:var(--panel2);color:var(--ice);border:1px solid var(--line);padding:10px 14px}
.btn-sm{background:var(--panel2);color:var(--muted);border:1px solid var(--line);padding:6px 10px;font-size:12px;border-radius:9px}
.btn-x{background:none;color:var(--dim);font-size:16px;padding:4px 8px}
.iconbtn{background:var(--panel2);border:1px solid var(--line);color:var(--ice);width:38px;height:38px;border-radius:11px;font-size:17px;display:flex;align-items:center;justify-content:center}
input[type=text],input[type=number],input[type=date],textarea,select{
  width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:11px;
  color:var(--text);font-family:inherit;font-size:15px;padding:11px 12px;outline:none}
input:focus,textarea:focus{border-color:var(--steel)}
textarea{min-height:92px;resize:vertical;line-height:1.45}
.tabs{display:flex;gap:6px;margin:14px 0 14px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;background:var(--panel);border:1px solid var(--line);color:var(--dim);padding:8px 14px;border-radius:20px;font-size:13px;font-weight:700}
.tab.on{background:var(--steel);color:#fff;border-color:var(--steel)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.bar-label{width:98px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
.bar-track{flex:1;height:14px;background:var(--panel2);border-radius:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--steel),var(--ice));min-width:2px;transition:width .3s}
.bar-fill.warn{background:linear-gradient(90deg,#b48a4d,#e0cba8)}
.bar-fill.hot{background:linear-gradient(90deg,#b44d4d,#e0a8a8)}
.bar-val{width:30px;font-size:12px;font-weight:700;color:var(--muted)}
.draft-item{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.draft-item.bad{border-color:#7a4444}
.d-name{font-weight:700;font-size:14px}
.d-meta{font-size:12px;color:var(--dim);margin-top:2px}
.ichips{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.ichip{font-size:11px;font-weight:700;padding:4px 9px;border-radius:16px;background:var(--obsidian);border:1px solid var(--line);color:var(--dim);cursor:pointer}
.ichip.on{background:var(--steel);color:#fff;border-color:var(--steel)}
.minirow{display:flex;gap:8px;margin-top:8px;align-items:center}
.minirow input{padding:7px 9px;font-size:13px}
.minirow .lbl{font-size:11px;color:var(--dim);flex-shrink:0}
.sess{border-left:3px solid var(--deep);padding:8px 12px;margin-bottom:10px}
.sess .sd{font-size:12px;color:var(--ice);font-weight:700}
.sess .st{font-size:14px;font-weight:700;margin:2px 0 4px}
.sess .sx{font-size:13px;color:var(--muted);line-height:1.5}
.pr{display:flex;justify-content:space-between;padding:8px 2px;border-bottom:1px solid var(--line);font-size:14px}
.pr:last-child{border:none}
.pr .pv{font-weight:800;color:var(--ice)}
.pr .pd{font-size:11px;color:var(--dim)}
.note{padding:9px 2px;border-bottom:1px solid var(--line);font-size:14px;color:var(--muted);line-height:1.5}
.note .nd{font-size:11px;color:var(--dim);font-weight:700;margin-bottom:2px}
.brief-box{line-height:1.6;font-size:14px}
.brief-box .bb{color:var(--ice);font-weight:700}
.muted{color:var(--dim);font-size:13px;line-height:1.55}
.backlink{color:var(--ice);font-weight:700;font-size:14px;background:none;padding:0}
.modal-bg{position:fixed;inset:0;background:rgba(4,6,12,.8);display:flex;align-items:flex-end;justify-content:center;z-index:50}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;padding:18px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0 14px}
.mg{font-size:12px;font-weight:700;padding:8px;border-radius:9px;background:var(--panel2);border:1px solid var(--line);color:var(--dim);text-align:center;cursor:pointer}
.mg.p{background:var(--steel);color:#fff;border-color:var(--steel)}
.mg.s{background:var(--deep);color:var(--ice);border-color:var(--deep)}
.pick-item{padding:11px 4px;border-bottom:1px solid var(--line);font-size:14px;font-weight:600;cursor:pointer}
.pick-item span{font-size:11px;color:var(--dim);font-weight:400;display:block}
.footer-note{text-align:center;font-size:11px;color:var(--dim);margin-top:26px}
.empty{color:var(--dim);font-size:13px;text-align:center;padding:18px 0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--steel);color:#fff;font-weight:700;font-size:13px;padding:10px 18px;border-radius:24px;z-index:99;box-shadow:0 4px 24px rgba(0,0,0,.5)}
</style>
</head>
<body>

<script>
/* ============================================================
   Spotter Engine v2 — Dwil Fitness
   Fatigue model, exercise library, and session text parser.
   v2: per-set (pyramid) parsing via setDetail
   ============================================================ */

const MUSCLES = [
  "quads","hamstrings","glutes","calves","chest","lats","mid-back","low-back",
  "rear-delts","side-delts","front-delts","biceps","triceps","forearms-grip",
  "core","adductors","abductors"
];

/* Intensity multipliers (spec) */
const INTENSITY = { warmup: 0.3, moderate: 1.0, heavy: 1.5, max: 2.0 };

const INTENSITY_WORDS = [
  { rx: /\b(warm[\s-]?up|very light|easy|light)\b/i, key: "warmup" },
  { rx: /\b(max(ed)?( out)?|amrap|true failure|to failure|failure)\b/i, key: "max" },
  { rx: /\b(heavy|grindy|grinder|tough|hard|rpe\s?8|rpe\s?9|rpe\s?10)\b/i, key: "heavy" },
  { rx: /\b(moderate|working sets?)\b/i, key: "moderate" },
];

/* Base fatigue per primary muscle per set (moderate). Secondary = 50%. */
const BASE_PRIMARY = 0.4;
const SECONDARY_FACTOR = 0.3;
const DECAY_RATE = 0.78;   // per day (default: chest, lats, mid-back)
/* small muscles recover faster; big lower-body slower */
const DECAY_BY_MUSCLE = {
  "biceps":0.72, "triceps":0.72, "side-delts":0.72, "rear-delts":0.72, "front-delts":0.72,
  "calves":0.72, "forearms-grip":0.72, "core":0.72, "abductors":0.72, "adductors":0.72,
  "quads":0.81, "hamstrings":0.81, "glutes":0.81, "low-back":0.81,
};
const DOMS_BUMP = 1.15;    // +15% on session day
const CAP = 10.0;

/* ---------------- Exercise library ---------------- */
const EXERCISE_LIBRARY = [
  { name: "Back Squat", aliases: ["back squat","barbell squat","squat","squats"], p: ["quads"], s: ["glutes","hamstrings"], sys: 1.2 },
  { name: "Front Squat", aliases: ["front squat","front squats"], p: ["quads"], s: ["glutes","core","low-back"], sys: 1.2 },
  { name: "Bulgarian Split Squat", aliases: ["bulgarian split squat","bulgarian split squats","bulgarian","split squat","split squats","rear foot elevated split squat"], p: ["quads","glutes"], s: ["hamstrings","adductors"], sys: 1.1 },
  { name: "Deadlift", aliases: ["deadlift","deadlifts","conventional deadlift","sumo deadlift","trap bar deadlift","hex bar deadlift"], p: ["hamstrings","glutes"], s: ["low-back","quads","forearms-grip","mid-back"], sys: 1.4 },
  { name: "Good Morning", aliases: ["good morning","good mornings"], p: ["hamstrings"], s: ["low-back","glutes"], sys: 1.1 },
  { name: "Shrug", aliases: ["shrug","shrugs","barbell shrug","db shrugs"], p: ["mid-back"], s: ["forearms-grip"] },
  { name: "Dips", aliases: ["dip","dips","chest dips","parallel bar dips"], p: ["triceps","chest"], s: ["front-delts"] },
  { name: "Push-up", aliases: ["push-up","push-ups","pushup","pushups","push up","push ups"], p: ["chest"], s: ["triceps","front-delts","core"] },
  { name: "Step-up", aliases: ["step-up","step-ups","step up","step ups","box step ups"], p: ["quads","glutes"], s: ["hamstrings"] },
  { name: "Hack Squat", aliases: ["hack squat"], p: ["quads"], s: ["glutes","hamstrings"], sys: 1.2 },
  { name: "Leg Press", aliases: ["leg press"], p: ["quads"], s: ["glutes","hamstrings"], sys: 1.2 },
  { name: "DB Squat", aliases: ["db squat","dumbbell squat","goblet squat"], p: ["quads"], s: ["glutes","hamstrings"] },
  { name: "RDL", aliases: ["rdl","romanian deadlift","db rdl","heavy db rdl"], p: ["hamstrings"], s: ["glutes","low-back"], sys: 1.2 },
  { name: "Walking Lunge", aliases: ["walking lunge","walking lunges","lunge","lunges"], p: ["quads","glutes"], s: ["hamstrings"] },
  { name: "Reverse Lunge", aliases: ["reverse lunge","reverse lunge with db overhead"], p: ["quads","glutes"], s: ["hamstrings"] },
  { name: "Hip Thrust", aliases: ["hip thrust"], p: ["glutes"], s: ["hamstrings"] },
  { name: "Leg Curl", aliases: ["leg curl","hamstring curl"], p: ["hamstrings"], s: [] },
  { name: "Nordic Curl", aliases: ["nordic curl","nordic curls","nordic ham curl","nordics"], p: ["hamstrings"], s: ["core"] },
  { name: "Leg Extension", aliases: ["leg extension","isometric leg extension"], p: ["quads"], s: [] },
  { name: "Calf Raise", aliases: ["calf raise","calf raises"], p: ["calves"], s: [] },
  { name: "Bench Press", aliases: ["bench press","barbell bench","bench"], p: ["chest"], s: ["front-delts","triceps"] },
  { name: "DB Bench Press", aliases: ["db bench","dumbbell bench","db bench press","single arm db bench press"], p: ["chest"], s: ["front-delts","triceps"] },
  { name: "Machine Chest Press", aliases: ["machine chest press","chest press machine","chest press"], p: ["chest"], s: ["front-delts","triceps"] },
  { name: "Incline Press", aliases: ["incline press","incline bench","incline bench press","incline smith machine bench press","incline db press"], p: ["chest"], s: ["front-delts","triceps"] },
  { name: "Chest Fly", aliases: ["chest fly","chest flies","pec fly","pec deck","cable fly","cable flies","cable chest fly","cable chest flies","high-to-low chest fly","high to low chest fly","high-to-low cable chest fly","high to low cable chest flies"], p: ["chest"], s: [] },
  { name: "Lat Pulldown", aliases: ["lat pulldown","lat pulldowns","pulldown"], p: ["lats"], s: ["biceps","rear-delts","mid-back"] },
  { name: "Pull-up", aliases: ["pull-up","pull up","pullup","chin-up","chin up","chinup"], p: ["lats"], s: ["biceps","rear-delts","mid-back"] },
  { name: "Seated Row", aliases: ["seated row"], p: ["mid-back"], s: ["lats","biceps","rear-delts"] },
  { name: "Cable Row", aliases: ["cable row","cable rows"], p: ["mid-back"], s: ["lats","biceps"] },
  { name: "T-Bar Row", aliases: ["t-bar row","t bar row","tbar row","chest supported t-bar row","chest supported row"], p: ["mid-back"], s: ["lats","biceps","rear-delts"] },
  { name: "Face Pull", aliases: ["face pull","band pull-apart","band pull apart"], p: ["rear-delts"], s: ["mid-back"] },
  { name: "Shoulder Press", aliases: ["oh press","overhead press","shoulder press","machine shoulder press","military press"], p: ["front-delts"], s: ["side-delts","triceps"] },
  { name: "Lateral Raise", aliases: ["lateral raise","lateral raises","db lateral raise","side raise"], p: ["side-delts"], s: [] },
  { name: "Reverse Fly", aliases: ["db reverse fly","reverse fly","reverse flies","rear delt fly","rear delt cable fly","rear delt cable flies","rear delt flies"], p: ["rear-delts"], s: [] },
  { name: "Bicep Curl", aliases: ["bicep curl","bicep curls","barbell curl","db curl","db bicep curl","db bicep curls","preacher curl","preacher curls","spider curl","concentration curl","ez bar curl","ez curl","incline curl","incline curls"], p: ["biceps"], s: ["forearms-grip"] },
  { name: "Cable Bicep Curl", aliases: ["cable bicep curl","cable curl"], p: ["biceps"], s: ["forearms-grip"] },
  { name: "Hammer Curl", aliases: ["hammer curl","hammer curls","db hammer curl","rope hammer curl"], p: ["biceps"], s: ["forearms-grip"] },
  { name: "Reverse Curl", aliases: ["reverse curl","reverse grip curl","reverse grip bicep curl","reverse grip bicep curls"], p: ["biceps"], s: ["forearms-grip"] },
  { name: "Tricep Pushdown", aliases: ["tricep pushdown","tricep pushdowns","pushdown","rope tricep pushdown","rope tricep pushdowns","long rope tricep pushdown","single arm tricep pushdown","single arm tricep pushdowns"], p: ["triceps"], s: [] },
  { name: "Overhead Tricep Extension", aliases: ["oh extension","overhead extension","overhead tricep extension","skull crusher","skull crushers"], p: ["triceps"], s: [] },
  { name: "Triceps Press", aliases: ["triceps press","tricep press","dip machine","weighted dip"], p: ["triceps"], s: ["chest","front-delts"] },
  { name: "Plank", aliases: ["plank","planks"], p: ["core"], s: [] },
  { name: "Side Plank", aliases: ["side plank","side planks","side plank raise","side plank raises"], p: ["core"], s: ["abductors"] },
  { name: "Ab Crunch", aliases: ["ab crunch","crunch","crunches","cable ab crunch","cable crunch"], p: ["core"], s: [] },
  { name: "Leg Lift", aliases: ["leg lift","leg lifts","leg raise","leg raises","leg lift holds with crunches","leg lift hold"], p: ["core"], s: [] },
  { name: "TRX Pushup", aliases: ["trx pushup","trx pushups","trx push-up","trx push ups"], p: ["chest"], s: ["front-delts","triceps","core"] },
  { name: "Dead Bug", aliases: ["dead bug","dead bugs","bird dog","bird dogs"], p: ["core"], s: [] },
  { name: "Adductor Machine", aliases: ["adductor machine","adductors machine","adductor"], p: ["adductors"], s: [] },
  { name: "Abductor Machine", aliases: ["abductor machine","abductors machine","abductor"], p: ["abductors"], s: [] },
  { name: "Lateral Trunk Flexion", aliases: ["lateral trunk flexion","lateral trunk flexion with kb","db hold lateral flexion","lateral flexion"], p: ["core"], s: [] },
  { name: "Cable Rotation", aliases: ["cable rotation","cable rotations","pallof press"], p: ["core"], s: [] },
  { name: "Shoulder Taps", aliases: ["shoulder taps","shoulder tap"], p: ["core"], s: ["front-delts"] },
  { name: "Rope Machine Pull", aliases: ["rope machine pull","rope machine pulls","rope pulls"], p: ["lats"], s: ["biceps","forearms-grip","core"] },
  { name: "Conditioning", aliases: ["conditioning","field day","lateral slides","skipping","hops"], p: ["calves"], s: ["quads","hamstrings","core"], sys: 1.6 },
  { name: "Running", aliases: ["run","running","jog","jogging","treadmill run","treadmill"], p: ["quads","calves"], s: ["hamstrings","glutes","core"], sys: 1.6 },
  { name: "Sprints", aliases: ["sprint","sprints","build-up sprints","hill sprints"], p: ["hamstrings","glutes"], s: ["quads","calves","core"], sys: 1.6 },
  { name: "Bike", aliases: ["bike","cycling","spin bike","stationary bike"], p: ["quads"], s: ["glutes","hamstrings","calves"], sys: 1.6 },
  { name: "Assault Bike", aliases: ["assault bike","air bike","echo bike"], p: ["quads"], s: ["biceps","triceps","calves","core"], sys: 1.6 },
  { name: "Rowing", aliases: ["rowing","row erg","erg","rower"], p: ["mid-back","quads"], s: ["lats","hamstrings","biceps","core","forearms-grip"], sys: 1.6 },
  { name: "Jump Rope", aliases: ["jump rope","jump-rope","jumping rope"], p: ["calves"], s: ["quads","core","forearms-grip"], sys: 1.6 },
  { name: "Box Jumps", aliases: ["box jump","box jumps"], p: ["quads","glutes"], s: ["calves","hamstrings","core"], sys: 1.3 },
  { name: "Broad Jumps", aliases: ["broad jump","broad jumps","standing long jump"], p: ["quads","glutes"], s: ["calves","hamstrings","core"], sys: 1.3 },
  { name: "Lateral Bounds", aliases: ["lateral bound","lateral bounds","skater jumps","skaters"], p: ["glutes","abductors"], s: ["quads","calves","adductors"], sys: 1.3 },
  { name: "Depth Jumps", aliases: ["depth jump","depth jumps","pogo hops","pogos"], p: ["calves","quads"], s: ["glutes","core"], sys: 1.3 },
  { name: "Burpees", aliases: ["burpee","burpees"], p: ["quads","chest"], s: ["core","front-delts","triceps","calves"], sys: 1.6 },
  { name: "Sled Push", aliases: ["sled push","sled pushes","prowler"], p: ["quads","glutes"], s: ["calves","core"], sys: 1.6 },
  { name: "Sled Pull", aliases: ["sled pull","sled pulls","sled drag"], p: ["hamstrings","glutes"], s: ["mid-back","forearms-grip","core"], sys: 1.6 },
  { name: "Stair Climber", aliases: ["stair climber","stairs","stairmaster","step mill"], p: ["quads","glutes"], s: ["calves"], sys: 1.6 },
  { name: "Swimming", aliases: ["swim","swimming","laps"], p: ["lats","front-delts"], s: ["mid-back","triceps","core"], sys: 1.6 },
  { name: "Mountain Climbers", aliases: ["mountain climber","mountain climbers"], p: ["core"], s: ["front-delts","quads"], sys: 1.3 },
];

/* ---------------- Core math ---------------- */

function setLoadSum(nSets) {
  let sum = 0;
  for (let i = 1; i <= nSets; i++) sum += i <= 3 ? 1.0 : i <= 5 ? 0.8 : 0.6;
  return sum;
}

function daysBetween(fromISO, toISO) {
  const ms = new Date(toISO + "T00:00:00") - new Date(fromISO + "T00:00:00");
  return Math.max(0, Math.round(ms / 86400000));
}

function decaySnapshot(snapshot, days) {
  const out = {};
  for (const m of MUSCLES) out[m] = Math.max(0, (snapshot[m] || 0) * Math.pow(DECAY_BY_MUSCLE[m] || DECAY_RATE, days));
  return out;
}

/* readiness-coupled decay: factor<1 (poor recovery) slows clearance, >1 speeds it */
function decaySnapshotAdj(snapshot, days, factor=1) {
  const out = {};
  for (const m of MUSCLES) out[m] = Math.max(0, (snapshot[m] || 0) * Math.pow(DECAY_BY_MUSCLE[m] || DECAY_RATE, days * factor));
  return out;
}

/* exercises: [{name, sets, intensity, primary, secondary}] */
function repFactor(reps) {
  const nums = String(reps ?? "").match(/\d+/g);
  if (!nums || !nums.length) return 1.0;
  const avg = nums.reduce((a,b)=>a + +b, 0) / nums.length;
  return Math.min(1.5, Math.max(0.7, Math.sqrt(avg / 8)));
}

function sessionFatigue(exercises) {
  const add = {};
  for (const m of MUSCLES) add[m] = 0;
  for (const ex of exercises) {
    const mult = INTENSITY[ex.intensity] ?? 1.0;
    const load = setLoadSum(ex.sets || 3) * repFactor(ex.reps);
    for (const m of ex.primary || []) add[m] += BASE_PRIMARY * mult * load;
    for (const m of ex.secondary || []) add[m] += BASE_PRIMARY * SECONDARY_FACTOR * mult * load;
  }
  return add;
}

/* Full update: decay old snapshot to session date, add session fatigue with DOMS bump, cap. */
function applySession(snapshot, lastUpdated, sessionDate, exercises) {
  const days = daysBetween(lastUpdated, sessionDate);
  const decayed = decaySnapshot(snapshot, days);
  const add = sessionFatigue(exercises);
  const out = {};
  for (const m of MUSCLES) out[m] = Math.min(CAP, decayed[m] + add[m] * DOMS_BUMP);
  return out;
}

function round1(x) { return Math.round(x * 10) / 10; }

/* ---- Systemic (whole-body) load: recovers ~2x faster than muscle fatigue ---- */
const SYS_BASE = 0.18, SYS_DECAY = 0.62;
function sessionSys(exercises){
  let t = 0;
  for (const ex of exercises) t += SYS_BASE * (INTENSITY[ex.intensity] ?? 1) * setLoadSum(ex.sets || 3) * (ex.sys || 1);
  return t;
}
function applySys(v, lastUpdated, date, exercises){
  const days = daysBetween(lastUpdated, date);
  return Math.min(CAP, v * Math.pow(SYS_DECAY, days) + sessionSys(exercises));
}
function decaySys(v, days){ return Math.max(0, v * Math.pow(SYS_DECAY, days)); }

/* ---------------- Parser ---------------- */

function normalize(s) {
  return s.toLowerCase().replace(/[^a-z0-9\s-]/g, " ").replace(/\s+/g, " ").trim();
}

function matchExercise(text, customLib) {
  const t = " " + normalize(text) + " ";
  const tSing = " " + normalize(text).replace(/(\w+)s\b/g, "$1") + " ";
  let best = null, bestLen = 0;
  const libs = customLib ? EXERCISE_LIBRARY.concat(customLib) : EXERCISE_LIBRARY;
  for (const ex of libs) {
    for (const a of ex.aliases) {
      const aa = " " + a + " ";
      const aSing = " " + a.replace(/(\w+)s\b/g, "$1") + " ";
      if ((t.includes(aa) || tSing.includes(aSing) || tSing.includes(aa) || t.includes(aSing)) && a.length > bestLen) {
        best = ex; bestLen = a.length;
      }
    }
  }
  return best;
}

function detectIntensity(text) {
  for (const w of INTENSITY_WORDS) if (w.rx.test(text)) return w.key;
  return "moderate";
}

/* Plain sets×reps: 4x8, 4×8-12, 3 sets of 10, 3x45s, 4 sets.
   First number < 20 (a plausible set count). */
function parseSetsReps(seg) {
  let m;
  if ((m = seg.match(/\b(\d{1,2})\s*(?:[x×]|by)\s*(\d+)(?:\s*[-–]\s*(\d+))?\s*(s|sec|seconds)?\b/i)) && +m[1] < 20) {
    return { sets: +m[1], reps: m[4] ? m[2] + "s" : (m[3] ? `${m[2]}-${m[3]}` : m[2]) };
  }
  if ((m = seg.match(/(\d+(?:\.\d+)?)\s*(?:min|mins|minutes)\b/i))) {
    const mins = +m[1];
    return { sets: Math.max(1, Math.min(6, Math.round(mins / 10))), reps: `${mins}min` };
  }
  if ((m = seg.match(/(\d+(?:\.\d+)?)\s*(?:miles?|mi)\b/i))) {
    const mins = +m[1] * 9;
    return { sets: Math.max(1, Math.min(6, Math.round(mins / 10))), reps: `${m[1]}mi` };
  }
  if ((m = seg.match(/(\d+(?:\.\d+)?)\s*(?:km|kilometers?)\b/i))) {
    const mins = +m[1] * 5.6;
    return { sets: Math.max(1, Math.min(6, Math.round(mins / 10))), reps: `${m[1]}km` };
  }
  if ((m = seg.match(/(\d+)\s*sets?\s*(?:of\s*(\d+)(?:\s*[-–]\s*(\d+))?)?/i))) {
    let reps = m[3] ? `${m[2]}-${m[3]}` : (m[2] || "");
    if (!reps) { const rm = seg.match(/\b(\d{1,2})\s*reps?\b/i); if (rm) reps = rm[1]; }
    return { sets: +m[1], reps };
  }
  return null;
}

/* Per-set (pyramid) tokens: weight×reps like "135x10" (first number >= 20),
   or reps@weight like "10@135". Returns [{weight, reps}] in order found. */
function parseSetTokens(seg) {
  const found = [];
  const rx = /(\d+(?:\.\d+)?)\s*(?:[x×]|by)\s*(\d+)\b/gi;
  let m;
  while ((m = rx.exec(seg))) {
    const a = +m[1], b = +m[2];
    if (a >= 20) found.push({ weight: a, reps: String(b), idx: m.index });
  }
  const rx2 = /\b(\d{1,2})\s*@\s*(\d+(?:\.\d+)?)/g;
  while ((m = rx2.exec(seg))) {
    const r = +m[1], w = +m[2];
    if (w >= 20) found.push({ weight: w, reps: String(r), idx: m.index });
  }
  found.sort((a, b) => a.idx - b.idx);
  return found.map(({ weight, reps }) => ({ weight, reps }));
}

function parseWeight(seg) {
  let m;
  if ((m = seg.match(/(?:at|@)\s*(\d+(?:\.\d+)?)\s*(?:lbs?|pounds?)?\b/i))) return +m[1];
  if ((m = seg.match(/(\d+(?:\.\d+)?)\s*(?:lbs?|pounds?)\b/i))) return +m[1];
  return null;
}

function maxWeight(setDetail) {
  const ws = setDetail.map(s => s.weight).filter(w => w != null);
  return ws.length ? Math.max(...ws) : null;
}

/* Split free text into segments and parse each.
   A segment with only weight×reps tokens continues the previous exercise
   (pyramid style: "bench 135x10, 155x8, 185x6").
   Returns { parsed: [...], unmatched: [...] } */
function parseSession(text, customLib) {
  const segments = text
    .split(/\n|,|;|•|(?:\s+then\s+)|(?:finished with)|(?:started with)/i)
    .map(s => s && s.trim()).filter(s => s && s.length > 1);
  const parsed = [], unmatched = [];
  let last = null; /* most recent item (parsed or unmatched) for pyramid continuation */
  const appendTokens = (item, tokens) => {
    if (!item.setDetail) {
      item.setDetail = [];
      const n = item.assumedSets ? 0 : (item.sets || 0);
      for (let i = 0; i < n; i++) item.setDetail.push({ reps: item.reps || "", weight: item.weight ?? null });
      delete item.assumedSets;
    }
    item.setDetail.push(...tokens);
    item.sets = item.setDetail.length;
    item.reps = item.setDetail.map(t => t.reps).join("/");
    item.weight = maxWeight(item.setDetail);
  };
  for (const seg of segments) {
    const tokens = parseSetTokens(seg);
    const sr = parseSetsReps(seg);
    const ex = matchExercise(seg, customLib);
    if (ex) {
      const base = { name: ex.name, primary: ex.p, secondary: ex.s, intensity: detectIntensity(seg), raw: seg };
      let item;
      if (tokens.length) {
        item = { ...base, setDetail: tokens, sets: tokens.length,
          reps: tokens.map(t => t.reps).join("/"), weight: maxWeight(tokens) };
      } else if (sr) {
        item = { ...base, sets: sr.sets, reps: sr.reps, weight: parseWeight(seg) };
      } else {
        item = { ...base, sets: 3, reps: "", weight: parseWeight(seg), assumedSets: true };
      }
      parsed.push(item); last = item;
    } else if (tokens.length && !sr && last) {
      /* bare weight×reps segment: continuation of previous exercise (pyramid sets) */
      appendTokens(last, tokens);
    } else if (sr || tokens.length) {
      const item = { raw: seg, sets: sr ? sr.sets : tokens.length, reps: sr ? sr.reps : tokens.map(t=>t.reps).join("/"),
        weight: tokens.length ? maxWeight(tokens) : parseWeight(seg),
        setDetail: tokens.length ? tokens : undefined, intensity: detectIntensity(seg) };
      unmatched.push(item); last = item;
    }
    /* else: filler text, skip */
  }
  return { parsed, unmatched };
}

/* ---------------- Brief ---------------- */

const BIG_GROUPS = ["quads","hamstrings","glutes","chest","lats","mid-back"];

function brief(snapshot, lastUpdated, todayISO, recFactor=1) {
  const days = daysBetween(lastUpdated, todayISO);
  const cur = decaySnapshotAdj(snapshot, days, recFactor);
  const recovering = MUSCLES.filter(m => cur[m] > 4.0).sort((a, b) => cur[b] - cur[a]);
  const fresh = MUSCLES.filter(m => cur[m] < 1.5);
  const readyBig = BIG_GROUPS.filter(m => cur[m] < 4.0).sort((a, b) => cur[a] - cur[b]);
  let suggestion;
  if (recovering.length === 0 && readyBig.length === BIG_GROUPS.length) {
    suggestion = "Everything is recovered — any focus works. Good day for the heaviest priority lift.";
  } else if (readyBig.length > 0) {
    suggestion = "Ready to load: " + readyBig.join(", ") + ". Steer volume there; go easy on " + (recovering.slice(0, 3).join(", ") || "nothing — all clear") + ".";
  } else {
    suggestion = "Every big group still carries fatigue — favor technique, core, or lighter accessory work today.";
  }
  return { current: cur, daysSince: days, recovering, fresh, ready: readyBig, suggestion };
}

/* ---- Recovery entry parser: "recovery 45 hrv 42 rhr 58 slept 6.5 steps 9k feel 3" ---- */
function parseRecovery(text){
  const t = " " + text.toLowerCase().replace(/[,;]/g," ") + " ";
  const num = rx => { const m = t.match(rx); return m ? parseFloat(m[1]) : null; };
  const k = rx => { const m = t.match(rx); if(!m) return null; let v = parseFloat(m[1]); if (/k/i.test(m[2]||"")) v*=1000; return Math.round(v); };
  const out = {};
  let v;
  if ((v = num(/\b(?:whoop|recovery|recov|readiness|body\s*battery|oura|garmin|fitbit|energy(?:\s*score)?)\s*(?:score\s*)?(\d{1,3})\s*%?/)) != null) out.whoop = Math.min(100, v);
  if ((v = num(/\bsleep\s*score\s*(\d{1,3})/)) != null) out.sleepQ = Math.max(1, Math.min(5, Math.round(v/20)));
  if ((v = num(/\bhrv\s*(\d{1,3})/)) != null) out.hrv = v;
  if ((v = num(/\b(?:rhr|resting(?:\s*(?:hr|heart\s*rate))?)\s*(\d{2,3})/)) != null) out.rhr = v;
  if ((v = num(/\b(?:slept|sleep(?:\s*(?:for|time|duration))?)\s*(\d{1,2}(?:\.\d)?)\s*(?:h|hr|hrs|hours)?/)) != null) out.sleepH = v;
  if ((v = num(/\b(?:sleep\s*quality|quality)\s*(\d)/)) != null) out.sleepQ = v;
  const sm = t.match(/\b(?:steps?)\s*(\d{1,3}(?:[.,]?\d{3})*|\d+(?:\.\d+)?)\s*(k)?/) || t.match(/\b(\d{1,2}(?:\.\d+)?)\s*(k)\s*steps?/);
  if (sm){ let s = parseFloat(String(sm[1]).replace(/,/g,"")); if (/k/i.test(sm[2]||"")) s*=1000; out.steps = Math.round(s); }
  if ((v = num(/\b(?:feel(?:ing)?|mood)\s*(\d)\b/)) != null) out.feel = Math.min(5, v);
  return out;
}

const Engine = {
  MUSCLES, INTENSITY, EXERCISE_LIBRARY, BASE_PRIMARY, SECONDARY_FACTOR, DECAY_RATE, DOMS_BUMP, CAP,
  setLoadSum, daysBetween, decaySnapshot, sessionFatigue, applySession, round1, DECAY_BY_MUSCLE, repFactor,
  decaySnapshotAdj, parseRecovery,
  SYS_BASE, SYS_DECAY, sessionSys, applySys, decaySys,
  normalize, matchExercise, detectIntensity, parseSetsReps, parseSetTokens, parseWeight, maxWeight,
  parseSession, brief, BIG_GROUPS,
};

if (typeof module !== "undefined") module.exports = Engine;
if (typeof window !== "undefined") window.Engine = Engine;

/* ============================================================
   Spotter Recovery / Readiness model — evidence-aligned
   Grounded in: HRV(RMSSD) deviation from personal rolling baseline is the
   top marker (Plews/Buchheit; WHOOP weighting); RHR inverse & less sensitive;
   sleep loss ~7.5% perf hit, 1-2 night recovery; 3-7 day trend > single reading;
   subjective wellness adds independent signal.
   ============================================================ */
(function(root){
  const clamp = (x,lo,hi) => Math.max(lo, Math.min(hi, x));
  const mean = a => a.reduce((s,v)=>s+v,0)/a.length;
  const sd = a => { const m=mean(a); return Math.sqrt(mean(a.map(v=>(v-m)*(v-m)))); };

  /* rolling baseline from prior entries for a metric key (last N, need >=3) */
  function baseline(entries, key, N=14){
    const vals = entries.map(e=>e[key]).filter(v=>v!=null && !isNaN(v)).slice(-N);
    if (vals.length < 3) return null;
    const m = mean(vals);
    return { mean: m, sd: Math.max(sd(vals), Math.abs(m)*0.05, 1e-6), n: vals.length };
  }

  /* signed contribution in [-1,1]; 0 = at baseline. 1.5 SD swing = full scale. */
  function zContribution(x, base, invert=false){
    if (base == null || x == null) return null;
    let z = (x - base.mean) / base.sd;
    if (invert) z = -z;                 // RHR: lower is better
    return clamp(z / 1.5, -1, 1);
  }

  function sleepContribution(h, q, need=8){
    let parts = [], w = [];
    if (h != null){ parts.push(clamp((h - need)/2, -1, 0.4)); w.push(0.7); }
    if (q != null){ parts.push(clamp((q - 3)/2, -1, 1));      w.push(0.3); }
    if (!parts.length) return null;
    const tw = w.reduce((s,v)=>s+v,0);
    return parts.reduce((s,v,i)=>s+v*w[i],0) / tw;
  }
  const feelContribution = f => f==null ? null : clamp((f-3)/2, -1, 1);

  const WEIGHTS = { hrv: 0.40, rhr: 0.18, sleep: 0.27, feel: 0.15 };

  /* Map baseline-neutral raw[-1,1] to 0-100 with asymmetry:
     at baseline -> 70 (solidly ready); bad days fall faster than good days rise. */
  function rawToScore(raw){
    return clamp(Math.round(70 + (raw >= 0 ? 30*raw : 65*raw)), 1, 100);
  }

  /* today's entry = latest; prior entries build the baseline.
     sysLoad = current systemic-fatigue score (0-10) from the training model. */
  function readiness(entries, sysLoad=0){
    if (!entries || !entries.length) return null;
    const sorted = [...entries].sort((a,b)=>a.date.localeCompare(b.date));
    const today = sorted[sorted.length-1];
    const prior = sorted.slice(0, -1);

    const comps = {
      hrv:  zContribution(today.hrv,  baseline(prior,"hrv"),  false),
      rhr:  zContribution(today.rhr,  baseline(prior,"rhr"),  true),
      sleep: sleepContribution(today.sleepH, today.sleepQ),
      feel: feelContribution(today.feel),
    };

    let score, usedWhoop = false;
    if (today.whoop != null){
      usedWhoop = true;                          // any device readiness score (WHOOP/Oura/Garmin/Fitbit) = spine
      score = today.whoop;
    } else {
      let num=0, den=0;
      for (const k in WEIGHTS) if (comps[k]!=null){ num += WEIGHTS[k]*comps[k]; den += WEIGHTS[k]; }
      score = den ? rawToScore(num/den) : null;  // no inputs -> unknown
    }
    if (score == null) return { score:null, band:"unknown", comps, usedWhoop, hasData:false };

    /* systemic pressure the wearable can't see from a manual score:
       apply lightly, and less when a device HRV/whoop is present (avoids double count). */
    const sysPenalty = clamp((sysLoad - 4) * 2.5, 0, 18);
    const damp = (usedWhoop || comps.hrv != null) ? 0.35 : 1.0;
    score = clamp(Math.round(score - sysPenalty * damp), 1, 100);

    const band = score >= 67 ? "green" : score >= 34 ? "yellow" : "red";
    return { score, band, comps, usedWhoop, sysPenalty: Math.round(sysPenalty*damp), hasData:true };
  }

  /* Recovery couples back into muscle-fatigue decay:
     low readiness slows recovery, high speeds it (bounded).
     effective_decay = base_decay ^ factor, factor<1 => retains more => slower recovery. */
  function recoveryFactor(score){
    if (score == null) return 1.0;
    return clamp(score / 70, 0.62, 1.32);
  }

  /* steps -> extra systemic load (external daily activity the gym log misses).
     ~8k steps baseline neutral; each additional 4k ≈ +0.4 systemic, capped. */
  function stepSys(steps){
    if (steps == null) return 0;
    return clamp((steps - 8000) / 4000 * 0.4, 0, 1.2);
  }

  const Recovery = { baseline, zContribution, sleepContribution, feelContribution,
    readiness, recoveryFactor, stepSys, rawToScore, WEIGHTS };
  if (typeof module !== "undefined") module.exports = Recovery;
  if (root) root.Recovery = Recovery;
})(typeof window !== "undefined" ? window : null);

function injuredMuscles(c){ const s=new Set(); for (const i of activeInjuries(c)) for (const m of i.muscles||[]) s.add(m); return s; }
function injDay(i){ return E.daysBetween(i.onset, todayISO()) + 1; }
function lastCheckIn(i){ return (i.checkIns&&i.checkIns.length) ? i.checkIns[i.checkIns.length-1] : null; }
function readyWord(score){ return score>=67?"ready":score>=34?"caution":"compromised"; }
function toast(msg){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2200);
}
function fmtDate(iso){
  const d=new Date(iso+"T00:00:00");
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}

function heat(v){ const t=Math.min(1,v/10); return `hsl(${140-140*t},72%,46%)`; }
function bodyMap(cur, injured){
  injured = injured || new Set();
  let tints = "", hits = "", inj = "";
  for (const [g, polys] of Object.entries(BM_REGIONS)){
    const v = cur[g] || 0, vv = E.round1(v).toFixed(1);
    const op = Math.min(0.82, 0.40 + (v/10)*0.42).toFixed(2);
    for (const poly of polys){
      const pts = poly.map(p=>p.join(",")).join(" ");
      tints += `<polygon points="${pts}" fill="${heat(v)}" fill-opacity="${op}"/>`;
      hits  += `<polygon points="${pts}" fill="transparent" data-bm="${g}:${vv}" style="cursor:pointer"/>`;
      if (injured.has(g)) inj += `<polygon points="${pts}" fill="url(#injp)" stroke="${INJ_COLOR}" stroke-width="2"/>`;
    }
  }
  return `<svg viewBox="0 0 860 1147" style="width:100%;max-width:460px;display:block;margin:0 auto" aria-label="fatigue body map">
    <defs>
      <filter id="bmblur" x="-10%" y="-10%" width="120%" height="120%"><feGaussianBlur stdDeviation="5"/></filter>
      <mask id="bmmask" maskUnits="userSpaceOnUse" x="0" y="0" width="860" height="1147">

      </pattern>
    </defs>
    <image href="${BM_IMG}" x="0" y="0" width="860" height="1147"/>
    <g mask="url(#bmmask)" style="mix-blend-mode:multiply" pointer-events="none">
      <g filter="url(#bmblur)">${tints}</g>
    </g>
    <g mask="url(#bmmask)" pointer-events="none">${inj}</g>
    <g>${hits}</g>
    <text x="225" y="1128" text-anchor="middle" fill="#8b93a5" font-size="30" letter-spacing="6" font-family="inherit">ANTERIOR</text>

    <span>Fatigued</span>
  </div>`;
}

let _pendingFetched = false;
function render(){
  const app = $("#app");
  if (view.page === "review") app.innerHTML = reviewView();
  else if (view.page === "roster") app.innerHTML = rosterView();
  else app.innerHTML = clientView();
  bind();
  if (S.syncUrl && S.syncKey && !_pendingFetched){ _pendingFetched = true; fetchPending(); }
}

function reviewView(){
  const subs = pendingSubs || [];
  if (!subs.length) return `<header><button class="backlink" data-act="back">‹ Roster</button><div class="word" style="margin-left:6px"><b>Review</b></div></header>
    <div class="empty">No pending client submissions.</div>
    <button class="btn2" style="width:100%" data-act="refreshsubs">↻ Check again</button>`;
  const cards = subs.map((s,i)=>{
    const c = S.clients.find(x=>x.id===s.client);
    const name = c ? c.name : s.client;
    if (s.kind === "recovery"){
      const r = E.parseRecovery(s.text);
      const RL = [["whoop","score"],["hrv","HRV"],["rhr","RHR"],["sleepH","sleep h"],["sleepQ","sleep q"],["feel","feel"],["steps","steps"]];
      const chips = RL.filter(kv=>r[kv[0]]!=null).map(kv=>`<span class="chip" style="margin-right:6px;margin-bottom:4px;display:inline-block">${kv[1]} ${r[kv[0]]}</span>`).join("");
      return `<div class="card">
        <div class="row"><div class="grow"><div class="cname">♥ ${esc(name)} — recovery check-in${c?"":' <span style="color:#e0a86a;font-size:11px">(no matching client)</span>'}</div>
        <div class="csub">${fmtDate(s.date)} · submitted ${fmtDate((s.submitted||"").slice(0,10))}</div></div></div>
        <div style="margin-top:8px">${chips||`<div class="muted">Nothing recognized — raw text: ${esc(s.text)}</div>`}</div>
        <div class="row" style="gap:8px;margin-top:10px">
          ${c&&chips?`<button class="btn2 grow" data-subapprove="${i}">✓ Approve → log it</button>`:""}
          <button class="btn2 grow" style="color:#e0a8a8" data-subreject="${i}">Reject</button>
        </div></div>`;
    }
    const { parsed, unmatched } = E.parseSession(s.text, S.customExercises);
    const exRows = parsed.map(p=>`<div class="pex" style="background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:7px 10px;margin-bottom:5px;font-size:13px">
      <b>${esc(p.name)}</b> <span style="color:var(--dim)">${p.setDetail?p.setDetail.map(x=>`${x.weight??"–"}×${x.reps||"?"}`).join(", "):`${p.sets}×${p.reps||"?"}${p.weight?" @ "+p.weight:""}`} · ${p.intensity}</span></div>`).join("");
    const unk = unmatched.map(u=>`<div style="color:#e0c48a;font-size:12px;margin-bottom:4px">? ${esc(u.raw)} — will be skipped unless you add it manually</div>`).join("");
    return `<div class="card">
      <div class="row"><div class="grow"><div class="cname">${esc(name)}${c?"":' <span style="color:#e0a86a;font-size:11px">(no matching client)</span>'}</div>
      <div class="csub">${fmtDate(s.date)}${s.title?" · "+esc(s.title):""} · submitted ${fmtDate((s.submitted||"").slice(0,10))}</div></div></div>
      <div style="margin-top:8px">${exRows||'<div class="muted">Nothing parsed.</div>'}${unk}</div>
      <div class="row" style="gap:8px;margin-top:10px">
        ${c&&parsed.length?`<button class="btn2 grow" data-subapprove="${i}">✓ Approve → log it</button>`:""}
        <button class="btn2 grow" style="color:#e0a8a8" data-subreject="${i}">Reject</button>
      </div>
      <div class="muted" style="margin-top:6px;font-size:10px">Approving runs it through the full model (fatigue, PRs, charts) for ${esc(name)}. Edit later via History if needed.</div>
    </div>`;
  }).join("");
  return `<header><button class="backlink" data-act="back">‹ Roster</button><div class="word" style="margin-left:6px"><b>Review</b> <span style="color:var(--dim);font-weight:400">${subs.length}</span></div></header>${cards}`;
}

function rosterView(){
  const rows = S.clients.map(c => {
    const b = E.brief(c.snapshot, c.lastUpdated, todayISO(), effFactor(c));
    const last = c.sessions[0] ? E.daysBetween(c.sessions[0].date, todayISO()) : null;
    const r = curReadiness(c);
    const status = (r && r.score!=null && !r.stale)
      ? `<span class="chip" style="color:${readyColor(r.score)};border-color:${readyColor(r.score)}44">♥ ${r.score}</span>`
      : (b.recovering.length
        ? `<span class="chip hot">${b.recovering[0]} ${E.round1(b.current[b.recovering[0]])}</span>`
        : `<span class="chip fresh">fresh</span>`);
    const injN = activeInjuries(c).length;
    return `<div class="card row" data-open="${c.id}" style="cursor:pointer">
      <div class="avatar">${esc(c.name[0])}</div>
      <div class="grow"><div class="cname">${esc(c.name)}</div>
      <div class="csub">${last===null?"no sessions logged":last===0?"trained today":last+" days since last session"}</div></div>
      ${injN?`<span class="chip" style="color:#e3c8ec;border-color:${INJ_COLOR}66">⚠ ${injN}</span>`:""}${status}</div>`;
  }).join("");
  const subBanner = (S.syncUrl && pendingSubs && pendingSubs.length)
    ? `<div class="card" style="border-color:#4D7DB4;cursor:pointer" data-act="review"><div class="row">
        <div class="grow"><div class="cname" style="color:var(--ice)">📥 ${pendingSubs.length} client submission${pendingSubs.length>1?"s":""} to review</div>
        <div class="csub">${[...new Set(pendingSubs.map(s=>{const c=S.clients.find(x=>x.id===s.client);return c?c.name:s.client;}))].join(", ")}</div></div>
        <span class="chip" style="color:var(--ice)">Review →</span></div></div>`
    : "";
  return `<header>${crescent}<div class="word"><b>Dwil</b> <span>Fitness</span></div><div class="sub">Spotter</div></header>
    ${subBanner}${rows}
    <div class="row" style="gap:8px;margin-top:14px">
      <button class="btn" data-act="add-client">+ Add client</button>
      ${S.syncUrl&&S.syncKey?`<button class="iconbtn" data-act="refreshsubs" title="Check for client submissions">↻</button>`:""}
      <button class="iconbtn" data-act="settings" title="Backup & data">⛭</button>
    </div>
    <div class="footer-note">${S.syncUrl&&S.syncKey?"Auto-backup to your sync server is on — restore anytime from ⛭.":"Data lives on this device — export a backup from ⛭ regularly."}</div>`;
}

function daysToReady(m, v, factor=1){
  if (v <= 4.0) return 0;
  const rate = Math.pow(E.DECAY_BY_MUSCLE[m] || E.DECAY_RATE, factor);
  return Math.ceil(Math.log(4.0 / v) / Math.log(rate));
}

let _curFactor = 1;
function fatigueBars(cur){
  const rows = E.MUSCLES.slice().sort((a,b)=>cur[b]-cur[a]).map(m=>{
    const v = E.round1(cur[m]);
    const col = heat(v);
    const d = daysToReady(m, v, _curFactor);
    const chip = d === 0
      ? (v <= 1.5
        ? `<span style="width:34px;text-align:center;font-size:10px;font-weight:800;color:${heat(0)}">✓</span>`
        : `<span style="width:34px;text-align:center;font-size:10px;font-weight:800;color:${heat(2.5)}">ok</span>`)
      : `<span style="width:34px;text-align:center;font-size:10px;font-weight:800;color:${col}">~${d}d</span>`;
    return `<div class="bar-row"><div class="bar-label">${m}</div>
      <div class="bar-track" style="position:relative">
        <div style="position:absolute;left:40%;top:0;bottom:0;width:1px;background:#2a3450;z-index:1"></div>
        <div style="position:absolute;left:65%;top:0;bottom:0;width:1px;background:#2a3450;z-index:1"></div>
        <div class="bar-fill" style="width:${Math.max(2,Math.min(100,v*10))}%;background:linear-gradient(90deg,${heat(Math.max(0,v-2.5))},${col})"></div>
      </div>
      <div class="bar-val" style="color:${col}">${v.toFixed(1)}</div>
      ${chip}</div>`;
  }).join("");
  return rows + `<div class="muted" style="margin-top:8px;font-size:10px;display:flex;gap:12px;flex-wrap:wrap">
    <span><span style="color:${heat(0.5)};font-weight:800">■</span> fresh &lt;4</span>
    <span><span style="color:${heat(5)};font-weight:800">■</span> moderate 4–6.5</span>
    <span><span style="color:${heat(8.5)};font-weight:800">■</span> high &gt;6.5</span>
    <span>✓ fresh · ok = trainable · ~d = days until ready for hard work (&lt;4.0)</span>
  </div>`;
}

function clientView(){
  const c = client(); if(!c){ view.page="roster"; return rosterView(); }
  const tabs = [["fatigue","Fatigue"],["injuries","Injuries"],["recovery","Recovery"],["log","Log"],["brief","Brief"],["charts","Charts"],["history","History"],["notes","Notes"]]
    .map(([k,l])=>`<button class="tab ${view.tab===k?"on":""}" data-tab="${k}">${l}</button>`).join("");
  return `<header><button class="backlink" data-act="back">‹ Roster</button>
    <div class="word" style="margin-left:6px"><b>${esc(c.name)}</b></div>
    <button class="btn-x" data-act="client-menu" title="Client settings" style="margin-left:auto">⋯</button>
    <div class="sub">${crescent}</div></header>
    <div class="muted">${esc(c.profile||"")}</div>
    <div class="tabs">${tabs}</div>
    ${ {fatigue:tabFatigue,injuries:tabInjuries,recovery:tabRecovery,log:tabLog,brief:tabBrief,charts:tabCharts,history:tabHistory,notes:tabNotes}[view.tab](c) }
    ${assignTarget!==null?assignModal():""}
    ${pickerOpen?pickerModal():""}`;
}

function sysWord(v){ return v<2?"fresh":v<4.5?"moderate":v<7?"high":"very high"; }

function sysGauge(c){
  const v = E.decaySys(c.sysFatigue||0, E.daysBetween(c.lastUpdated, todayISO()));
  const pct = Math.round(Math.min(10, v) * 10);
  const col = heat(v);
  const word = sysWord(v);
  const d = v <= 2 ? 0 : Math.ceil(Math.log(2 / v) / Math.log(E.SYS_DECAY));
  return `<div style="width:56px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer"
    data-bmv="Systemic load ${E.round1(v)} / 10 (${word}) — whole-body training stress across all sessions; recovers about twice as fast as muscle fatigue${d>0?`; ~${d}d until fresh`:""}">
    <div style="font-size:15px;font-weight:800;color:${col}">${E.round1(v)}</div>
    <div style="flex:1;width:22px;position:relative;border-radius:11px;overflow:hidden;border:1px solid #232c42;background:#0d1424">

/* trailing-7-day working sets per muscle (primary 1x, secondary 0.5x) */
function weeklyVolume(c){
  const cutoff = localISO(new Date(Date.now() - 6*86400000));
  const vol = {};
  for (const s of c.sessions){
    if (!s.exercises || s.date < cutoff) continue;
    for (const x of s.exercises){
      const m = exMuscles(x.name);
      for (const g of m.p) vol[g] = (vol[g]||0) + (x.sets||0);
      for (const g of m.s) vol[g] = (vol[g]||0) + (x.sets||0)*0.5;
    }
  }
  return vol;
}

function volumeCard(c){
  const vol = weeklyVolume(c);
  const rows = Object.keys(vol).filter(m=>vol[m]>0).sort((x,y)=>vol[y]-vol[x]);
  if (!rows.length) return "";
  const cell = m => {
    const v = Math.round(vol[m]*2)/2;
    const col = v > 20 ? "#e0a86a" : v >= 10 ? "#8fd0a8" : "#8b93a5";
    const tag = v > 20 ? " high" : v >= 10 ? "" : "";
    return `<div style="display:flex;justify-content:space-between;padding:4px 8px;font-size:13px">
      <span style="color:#CFD3DC">${m}</span><span style="font-weight:800;color:${col}">${v}${tag}</span></div>`;
  };
  return `<div class="card"><h2 style="margin-top:0">Weekly volume <span style="font-weight:400;color:#8b93a5;font-size:11px">working sets · last 7 days · secondaries ×0.5</span></h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 10px">${rows.map(cell).join("")}</div>
    <div class="muted" style="margin-top:8px;font-size:10px"><span style="color:#8fd0a8;font-weight:800">green</span> = in the 10–20 set growth range · <span style="color:#e0a86a;font-weight:800">orange</span> = 20+, watch recovery</div>
  </div>`;
}

function flagsBlock(c){

/* ---------------- Lift progress charts ---------------- */
function repN(r){ const m = String(r??"").match(/\d+/); return m ? +m[0] : 0; }

/* per-exercise series: oldest->newest [{date, w, r, vol}] */
function liftSeries(c){
  const map = {};
  const sess = [...c.sessions].sort((a,b)=>a.date.localeCompare(b.date));
  for (const s of sess){
    if (!s.exercises) continue;
    for (const x of s.exercises){
      let top = null, vol = 0;
      const e1rm = (w, r) => (!r || r <= 1) ? w : Math.round(w * (1 + Math.min(r, 12) / 30));
      if (x.setDetail && x.setDetail.length){
        for (const sd of x.setDetail){
          if (sd.weight == null) continue;
          const r = repN(sd.reps), e = e1rm(sd.weight, r);
          vol += sd.weight * r;
          if (!top || e > top.e1) top = { w: sd.weight, r, e1: e };
        }
      } else if (x.weight != null){
        const r = repN(x.reps);
        vol = x.weight * r * (x.sets || 1);
        top = { w: x.weight, r, e1: e1rm(x.weight, r) };
      }
      if (top){ (map[x.name] = map[x.name] || []).push({ date: s.date, w: top.w, r: top.r, e1: top.e1, vol }); }
    }
  }
  return map;
}

function chartSvg(pts){
  const W = 520, H = 210, L = 46, R = 12, T = 18, B = 34;
  const iw = W - L - R, ih = H - T - B;
  const ws = pts.map(p=>p.e1), vmax = Math.max(...pts.map(p=>p.vol), 1);
  let wmin = Math.min(...ws), wmax = Math.max(...ws);
  if (wmax === wmin){ wmax += 10; wmin = Math.max(0, wmin - 10); }
  const pad = (wmax - wmin) * 0.15; wmin = Math.max(0, wmin - pad); wmax += pad;
  const X = i => pts.length === 1 ? L + iw/2 : L + iw * i / (pts.length - 1);
  const Y = w => T + ih - ih * (w - wmin) / (wmax - wmin);
  let out = "";
  /* gridlines + y labels */
  for (let g = 0; g <= 2; g++){
    const wv = wmin + (wmax - wmin) * g / 2, y = Y(wv);
    out += `<line x1="${L}" y1="${y}" x2="${W-R}" y2="${y}" stroke="#232c42" stroke-width="1"/>`;
    out += `<text x="${L-6}" y="${y+4}" text-anchor="end" fill="#8b93a5" font-size="11">${Math.round(wv)}</text>`;
  }
  /* volume line (own scale, subtle) */
  if (pts.length > 1){
    const vY = v => T + ih - ih * 0.8 * v / vmax;
    const vpath = pts.map((p,i)=>`${i?"L":"M"}${X(i)},${vY(p.vol)}`).join(" ");
    out += `<path d="${vpath} L${X(pts.length-1)},${T+ih} L${X(0)},${T+ih} Z" fill="rgba(168,196,224,0.07)"/>`;
    out += `<path d="${vpath}" fill="none" stroke="rgba(168,196,224,0.45)" stroke-width="1.5"/>`;
  }
  /* top-set line */
  if (pts.length > 1){
    const path = pts.map((p,i)=>`${i?"L":"M"}${X(i)},${Y(p.e1)}`).join(" ");
    out += `<path d="${path}" fill="none" stroke="#4D7DB4" stroke-width="2.5" stroke-linejoin="round"/>`;
  }
  /* dots + weight×reps labels + x dates */
  for (let i = 0; i < pts.length; i++){
    const p = pts[i], x = X(i), y = Y(p.e1);
    const detail = `${fmtDate(p.date)} · best set ${p.r?`${p.w}×${p.r}`:p.w+" lbs (no reps logged)"} · est 1RM ${p.e1} lbs${p.vol?` · session volume ${Math.round(p.vol)}`:""}`;
    out += `<circle cx="${x}" cy="${y}" r="4.5" fill="#A8C4E0" stroke="#0A0E18" stroke-width="1.5" data-bmv="${detail}"><title>${detail}</title></circle>`;
    const lx = Math.min(Math.max(x, L+20), W-R-22);
    out += `<text x="${lx}" y="${y-9}" text-anchor="middle" fill="#CFD3DC" font-size="11" font-weight="700">${p.r?`${p.w}×${p.r}`:p.w}</text>`;
    const d = new Date(p.date+"T00:00:00");
    const lbl = (d.getMonth()+1)+"/"+d.getDate();
    if (pts.length <= 8 || i === 0 || i === pts.length-1 || i % Math.ceil(pts.length/6) === 0)
      out += `<text x="${x}" y="${H-10}" text-anchor="middle" fill="#8b93a5" font-size="10">${lbl}</text>`;
  }
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">${out}</svg>`;
}

function buildChartCards(c){
  const cutoff = chartRange === "all" ? "0000-00-00"
    : localISO(new Date(Date.now() - (CHART_RANGES[chartRange]||92)*86400000));
  const q = E.normalize(chartSearch);
  const series = liftSeries(c);
  const entries = Object.keys(series)
    .filter(n=>!q || E.normalize(n).includes(q))
    .map(n=>({ n, pts: series[n].filter(p=>p.date >= cutoff) }))
    .filter(o=>o.pts.length)
    .sort((a,b)=>b.pts[b.pts.length-1].date.localeCompare(a.pts[a.pts.length-1].date));
  if (!entries.length) return `<div class="empty">No weighted lifts match — widen the range or clear the search.</div>`;
  return entries.map(({n, pts})=>{
    const last = pts[pts.length-1];
    const first = pts[0];
    const delta = pts.length > 1 ? (last.e1 - first.e1) : 0;
    const trend = pts.length > 1 ? ` · ${delta >= 0 ? "+" : ""}${delta} lbs e1RM since ${fmtDate(first.date)}` : " · first data point";
    return `<div class="card">
      <div class="row"><div class="grow"><div class="d-name">${esc(n)}</div>
      <div class="d-meta">est 1RM ${last.e1} lbs (best set ${last.r?`${last.w}×${last.r}`:last.w})${trend}</div></div></div>
      <div style="margin-top:8px">${chartSvg(pts)}</div>
      <div class="muted" style="margin-top:4px;font-size:10px">Bold line: estimated 1RM (Epley) · Labels: actual best set weight×reps · Thin line: session volume · Hover or tap points for detail</div>
    </div>`;
  }).join("");
}

function readinessBreakdown(r){
  if (!r || r.score==null) return "";
  if (r.usedWhoop) return `<div class="muted" style="font-size:11px;margin-top:6px">From device readiness score${r.sysPenalty?` · −${r.sysPenalty} for tracked training load`:""}.</div>`;
  const label = {hrv:"HRV",rhr:"resting HR",sleep:"sleep",feel:"feel"};
  const parts = Object.keys(label).filter(k=>r.comps[k]!=null).map(k=>{
    const v = r.comps[k], up = v>0.15, dn = v<-0.15;
    const col = up?"#5fb48a":dn?"#c95f5f":"#8b93a5";
    return `<span style="color:${col};font-size:11px;font-weight:700">${label[k]} ${up?"↑":dn?"↓":"~"}</span>`;
  }).join(" · ");
  return `<div style="margin-top:6px">${parts}${r.sysPenalty?` <span style="color:#8b93a5;font-size:11px">· −${r.sysPenalty} training load</span>`:""}</div>`;
}

function recTrendChart(c){
  const pts = [...c.recovery].sort((a,b)=>a.date.localeCompare(b.date))
    .map((e,i,arr)=>({ date:e.date, score: Recovery.readiness(arr.slice(0,i+1), 0).score }))
    .filter(p=>p.score!=null);
  if (pts.length < 2) return "";
  const W=520,H=150,L=32,R=12,T=12,B=26, iw=W-L-R, ih=H-T-B;
  const X=i=>pts.length===1?L+iw/2:L+iw*i/(pts.length-1), Y=s=>T+ih-ih*s/100;
  let out="";
  for (const g of [0,50,100]){ const y=Y(g); out+=`<line x1="${L}" y1="${y}" x2="${W-R}" y2="${y}" stroke="#232c42"/><text x="${L-5}" y="${y+3}" text-anchor="end" fill="#8b93a5" font-size="10">${g}</text>`; }
  out+=`<line x1="${L}" y1="${Y(67)}" x2="${W-R}" y2="${Y(67)}" stroke="#2e4d3c" stroke-dasharray="3 3"/><line x1="${L}" y1="${Y(34)}" x2="${W-R}" y2="${Y(34)}" stroke="#5a3535" stroke-dasharray="3 3"/>`;
  const path = pts.map((p,i)=>`${i?"L":"M"}${X(i)},${Y(p.score)}`).join(" ");
  out+=`<path d="${path}" fill="none" stroke="#4D7DB4" stroke-width="2.5"/>`;
  for (let i=0;i<pts.length;i++){ const p=pts[i]; out+=`<circle cx="${X(i)}" cy="${Y(p.score)}" r="3.5" fill="${readyColor(p.score)}" stroke="#0A0E18" stroke-width="1.2"/>`; }

/* ---------------- Actions ---------------- */
function parseText(){
  const t = $("#logtext").value.trim(); if(!t) return;
  const { parsed, unmatched } = E.parseSession(t, S.customExercises);
  for (const p of parsed) draft.push(p);
  for (const u of unmatched) draft.push({ ...u, unmatched:true });
  if (!parsed.length && !unmatched.length) toast("Nothing parsed — include sets like 3x10, or use + Quick add > Create new exercise");
  render();
}

function normalizeItem(it){
  if (it.setDetail && it.setDetail.length){
    it.sets = it.setDetail.length;
    it.reps = it.setDetail.map(s=>s.reps||"").join("/");
    it.weight = E.maxWeight(it.setDetail);
  }
  return it;
}

function exMuscles(name){
  const ex = E.matchExercise(name, S.customExercises);
  return ex ? { p: ex.p, s: ex.s, sys: ex.sys || 1 } : { p: [], s: [], sys: 1 };
}

/* Replay all structured sessions from the zero baseline so fatigue and PRs stay
   correct after edits, deletes, and back-dated logging. Legacy PRs (pre-app,
   dated before 2026-06-22) are kept unless beaten. */
function rebuildClient(c){
  const structured = c.sessions.filter(s=>s.exercises && s.exercises.length).sort((a,b)=>a.date.localeCompare(b.date));
  let snap = zeroSnap(), last = "2026-06-22", sys = 0;
  if (structured.length && structured[0].date < last) last = structured[0].date;
  for (const s of structured){
    const items = s.exercises.map(x=>{ const m = exMuscles(x.name); return { ...x, primary:m.p, secondary:m.s, sys:m.sys }; });
    sys = E.applySys(sys, last, s.date, items);
    snap = E.applySession(snap, last, s.date, items);
    last = s.date;
  }
  c.snapshot = snap; c.sysFatigue = sys; c.lastUpdated = last;
  const map = {};
  for (const p of c.prs.filter(p=>p.date < "2026-06-22")) map[p.exercise] = { ...p };
  for (const s of structured) for (const x of s.exercises){
    if (x.weight == null) continue;
    const detail = x.setDetail ? x.setDetail.map(sd=>`${sd.weight??"–"}×${sd.reps||"?"}`).join(", ") : `${x.sets}×${x.reps||"?"}`;
    const e0 = map[x.name];
    if (!e0 || x.weight > e0.weight) map[x.name] = { exercise:x.name, weight:x.weight, detail, date:s.date };
  }
  c.prs = Object.values(map).sort((a,b)=>b.date.localeCompare(a.date));
}

/* Save a parsed session for a specific client (used by log tab + client-submission review) */
function applyParsedSession(c, items, date, title){
  const before = {}; for (const p of c.prs) before[p.exercise] = p.weight;
  c.sessions.push({ date, title: title||"Session", exercises: items.map(({name,sets,reps,weight,intensity,setDetail})=>({name,sets,reps,weight,intensity,...(setDetail?{setDetail}:{})})) });
  c.sessions.sort((a,b)=>b.date.localeCompare(a.date));
  rebuildClient(c);
  let prMsg = "";
  for (const p of c.prs) if (before[p.exercise] != null && p.weight > before[p.exercise]) prMsg = ` New PR: ${p.exercise} ${p.weight} lbs!`;
  return prMsg;
}

function saveSession(){
  const c = client();
  if (draft.some(d=>d.unmatched)) { toast("Assign muscles to flagged items first"); return; }
  const items = draft.filter(d=>!d.unmatched).map(normalizeItem);
  if (!items.length) return;
  draftDate = $("#sessdate").value || todayISO();
  const title = $("#sesstitle").value.trim() || "Session";
  const prMsg = applyParsedSession(c, items, draftDate, title);
  draft = []; draftDate = todayISO(); draftTitle = "";
  save();
  view.tab = "fatigue"; render();
  const top = E.MUSCLES.slice().sort((a,b)=>c.snapshot[b]-c.snapshot[a]).slice(0,3)
    .map(m=>`${m} ${E.round1(c.snapshot[m])}`).join(" · ");
  toast(`Saved. Highest: ${top}.${prMsg}`);
}

function confirmAssign(){
  const creating = assignTarget === -1;
  const it = creating ? { raw: "", sets: 3, reps: "", weight: null, intensity: "moderate" } : draft[assignTarget];
  const p = Object.keys(assignSel).filter(m=>assignSel[m]==="p");
  const s = Object.keys(assignSel).filter(m=>assignSel[m]==="s");
  if (!p.length){ toast("Pick at least one primary muscle"); return; }
  const name = $("#newexname").value.trim() || it.raw;
  const existing = E.matchExercise(name, S.customExercises);
  const ex = (existing && E.normalize(existing.name) === E.normalize(name))
    ? existing
    : { name, aliases:[E.normalize(name)], p, s };
  if (ex !== existing){ S.customExercises.push(ex); }
  save(); syncExLib();
  const item = { name, primary:p, secondary:s, sets:it.setDetail?it.setDetail.length:(it.sets||3),
    reps:it.reps||"", weight:it.weight??null, intensity:it.intensity||"moderate",
    ...(it.setDetail?{setDetail:it.setDetail}:{}), raw:it.raw };
  if (creating) draft.push(item); else draft[assignTarget] = item;
  assignTarget = null; assignSel = {};
  render(); toast(`Added “${name}” to your exercise library`);
}

/* map WHOOP v2 API payload -> Spotter recovery entries (defensive on field names) */
function whoopMap(payload){
  const byDate = {};
  const dOf = iso => iso ? String(iso).slice(0,10) : null;
  for (const s of (payload.sleep||[])){
    const d = dOf(s.end || s.start); if (!d) continue;
    const sc = s.score || {}, st = sc.stage_summary || {};
    let ms = null;
    if (st.total_light_sleep_time_milli != null)
      ms = (st.total_light_sleep_time_milli||0) + (st.total_slow_wave_sleep_time_milli||0) + (st.total_rem_sleep_time_milli||0);
    if (ms == null && s.start && s.end) ms = new Date(s.end) - new Date(s.start);
    const e = byDate[d] = byDate[d] || { date: d, src: "whoop" };
    if (ms != null && ms > 0) e.sleepH = Math.round(ms/360000)/10;
    if (sc.sleep_performance_percentage != null) e.sleepQ = Math.max(1, Math.min(5, Math.round(sc.sleep_performance_percentage/20)));
  }
  for (const r of (payload.recovery||[])){
    const d = dOf(r.created_at || r.updated_at); if (!d) continue;
    const sc = r.score || {};
    const e = byDate[d] = byDate[d] || { date: d, src: "whoop" };
    if (sc.recovery_score != null) e.whoop = Math.round(sc.recovery_score);
    if (sc.hrv_rmssd_milli != null) e.hrv = Math.round(sc.hrv_rmssd_milli);
    if (sc.resting_heart_rate != null) e.rhr = Math.round(sc.resting_heart_rate);
  }
  return Object.values(byDate).sort((x,y)=>x.date.localeCompare(y.date));
}

function mergeRecovery(c, entries){
  let added = 0;
  for (const inc of entries){
    const i = (c.recovery||[]).findIndex(e=>e.date===inc.date);
    if (i >= 0) c.recovery[i] = { ...c.recovery[i], ...inc };
    else { c.recovery.push(inc); added++; }
  }
  c.recovery.sort((x,y)=>x.date.localeCompare(y.date));
  return added;
}

function syncWhoop(){
  const c = client();
  if (!S.syncUrl || !S.syncKey){ toast("Set the WHOOP sync server in ⛭ first"); return; }
  toast("Syncing WHOOP…");
  fetch(`${S.syncUrl.replace(/\/+$/,"")}/sync?client=${encodeURIComponent(c.id)}&key=${encodeURIComponent(S.syncKey)}`)
    .then(r=>r.json())
    .then(data=>{
      if (data.error === "not_connected"){ toast(`${c.name} hasn't authorized WHOOP yet — send them the connect link`); return; }
      if (data.error){ toast("Sync error: " + data.error); return; }
      const entries = whoopMap(data);
      if (!entries.length){ toast("No WHOOP data returned"); return; }
      const added = mergeRecovery(c, entries);
      save(); render();
      const r = Recovery.readiness(c.recovery, curSys(c));
      toast(`Synced ${entries.length} days (${added} new). Readiness ${r&&r.score!=null?r.score+"/100":"–"}.`);
    })
    .catch(e=>toast("Sync failed: " + e.message));
}

function clientLogLink(c){
  if (!S.syncUrl) return null;
  const base = location.origin + location.pathname.replace(/[^/]*$/, "");
  return `${base}log.html?c=${encodeURIComponent(c.id)}&w=${encodeURIComponent(S.syncUrl.replace(/\/+$/,""))}`;
}

function approveSub(idx){
  const s = pendingSubs[idx]; if (!s) return;
  const c = S.clients.find(x=>x.id===s.client); if (!c) return;
  if (s.kind === "recovery"){
    const r = E.parseRecovery(s.text);
    if (!Object.keys(r).length){ toast("Nothing recognized in that check-in"); return; }
    c.recovery = c.recovery || [];
    mergeRecovery(c, [{ date: s.date || todayISO(), ...r }]);
    const sid = s.id; pendingSubs = pendingSubs.filter(x=>x!==s); save();
    ackSub(sid); render(); toast(`Recovery logged for ${c.name}`); return;
  }
  const { parsed } = E.parseSession(s.text, S.customExercises);
  const items = parsed.map(p=>{ const m=exMuscles(p.name); return {...p, primary:m.p, secondary:m.s, sys:m.sys}; });
  if (!items.length){ toast("Nothing to log in that submission"); return; }
  const prMsg = applyParsedSession(c, items, s.date, s.title||"Solo session");
  const sid = s.id; pendingSubs = pendingSubs.filter(x=>x!==s); save();
  ackSub(sid); render(); toast(`Logged for ${c.name}.${prMsg}`);
}
function rejectSub(idx){
  const s = pendingSubs[idx]; if (!s) return;
  if (confirm("Reject and delete this submission?")){ const sid=s.id; pendingSubs=pendingSubs.filter(x=>x!==s); ackSub(sid); render(); toast("Rejected"); }
}

function autoBackup(force){
  if (!S.syncUrl || !S.syncKey || _backupBusy) return;
  const last = +(store.getItem("dwil-backup-ts")||0);
  if (!force && Date.now() - last < 20*3600*1000) return;
  _backupBusy = true;
  fetch(`${S.syncUrl.replace(/\/+$/,"")}/backup?key=${encodeURIComponent(S.syncKey)}`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ saved: new Date().toISOString(), state: S })
  }).then(r=>r.json()).then(d=>{
    _backupBusy = false;
    if (d && d.ok){ store.setItem("dwil-backup-ts", String(Date.now())); if (force) toast("Cloud backup saved"); }
    else if (force) toast("Backup failed: " + ((d&&d.error)||"unknown"));
  }).catch(()=>{ _backupBusy = false; if (force) toast("Backup failed — network"); });
}
function restoreBackup(){
  if (!S.syncUrl || !S.syncKey){ toast("Set the sync server in ⛭ first"); return; }
  fetch(`${S.syncUrl.replace(/\/+$/,"")}/backup?key=${encodeURIComponent(S.syncKey)}`)
    .then(r=>r.json()).then(d=>{
      if (!d || d.error || !d.state){ toast("No cloud backup found yet"); return; }
      const when = String(d.saved||"").replace("T"," ").slice(0,16);
      if (!confirm(`Replace ALL data on this device with the cloud backup from ${when}?`)) return;
      S = d.state; store.setItem(LS_KEY, JSON.stringify(S)); render(); toast("Restored from cloud backup");
    }).catch(()=>toast("Could not reach the backup server"));
}

function fetchPending(){
  if (!S.syncUrl || !S.syncKey) return;
  fetch(`${S.syncUrl.replace(/\/+$/,"")}/pending?key=${encodeURIComponent(S.syncKey)}`)
    .then(r=>r.json()).then(d=>{ if (!d.error){ pendingSubs = d.pending||[]; render(); } })
    .catch(()=>{});
}

function syncExLib(){
  if (!S.syncUrl || !S.syncKey) return;
  fetch(`${S.syncUrl.replace(/\/+$/,"")}/exlib?key=${encodeURIComponent(S.syncKey)}`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ exercises: S.customExercises || [] })
  }).catch(()=>{});
}

function ackSub(id, cb){
  fetch(`${S.syncUrl.replace(/\/+$/,"")}/ack?key=${encodeURIComponent(S.syncKey)}&id=${encodeURIComponent(id)}`, {method:"POST"})
    .then(r=>r.json()).then(()=>cb&&cb()).catch(()=>cb&&cb());
}

function whoopConnectLink(c){
  return S.syncUrl ? `${S.syncUrl.replace(/\/+$/,"")}/auth?client=${encodeURIComponent(c.id)}` : null;
}

function saveRecovery(){
  const c = client();
  const txt = $("#rectext").value.trim();
  const parsed = txt ? E.parseRecovery(txt) : {};
  if (!Object.keys(parsed).length){ toast("Nothing parsed — try: hrv 45 rhr 55 slept 7 feel 4"); return; }
  parsed.date = $("#recdate").value || todayISO();
  c.recovery = (c.recovery||[]).filter(e=>e.date!==parsed.date);
  c.recovery.push(parsed);
  c.recovery.sort((a,b)=>a.date.localeCompare(b.date));
  save(); render();
  const r = Recovery.readiness(c.recovery, curSys(c));
  toast(r && r.score!=null ? `Saved. Readiness ${r.score}/100 (${readyWord(r.score)}).` : "Entry saved.");
}

function addClient(){
  const name = prompt("Client name?");
  if (!name || !name.trim()) return;
  const id = name.trim().toLowerCase().replace(/\s+/g,"-");
  if (S.clients.some(c=>c.id===id)){ toast("That client already exists"); return; }
  S.clients.push({ id, name:name.trim(), profile:"", snapshot:zeroSnap(), sysFatigue:0, recovery:[], injuries:[], lastUpdated:todayISO(), sessions:[], prs:[], notes:[], nextPlan:"" });
  save(); render(); toast(`${name.trim()} added`);
}

/* ---------------- Event wiring ---------------- */
function bind(){
  const app = $("#app");
  app.onclick = e => {
    const t = e.target.closest("[data-open],[data-act],[data-tab],[data-del],[data-assign],[data-int],[data-mus],[data-pick],[data-close],[data-delnote],[data-pinnote],[data-sdmode],[data-sda],[data-sdx],[data-bm],[data-bmv],[data-editsess],[data-delsess],[data-crange],[data-delrec],[data-injmus],[data-injgrade],[data-injci],[data-injclear],[data-injdel],[data-subapprove],[data-subreject]");
    if (!t) return;
    const ds = t.dataset;
    if (ds.open){ if (draft.length && !confirm("Discard the unsaved session draft?")) return; view={page:"client",clientId:ds.open,tab:"fatigue"}; draft=[]; draftTitle=""; chartSearch=""; render(); }
    else if (ds.bmv){ toast(ds.bmv); }
    else if (ds.crange){ chartRange = ds.crange; render(); }
    else if (ds.subapprove!==undefined && ds.subapprove!=="") approveSub(+ds.subapprove);
    else if (ds.subreject!==undefined && ds.subreject!=="") rejectSub(+ds.subreject);
    else if (ds.injmus){ injSel[ds.injmus] = !injSel[ds.injmus]; if(!injSel[ds.injmus]) delete injSel[ds.injmus]; render(); }
    else if (ds.injgrade){ injForm.grade = ds.injgrade; render(); }
    else if (ds.injci){ const c=client(); const i=c.injuries.find(x=>x.id===ds.injci); if(!i) return;
      const pv = $("#pain-"+ds.injci).value, nv = $("#cinote-"+ds.injci).value.trim();
      if (pv===""){ toast("Enter a pain score 0–10"); return; }
      i.checkIns = i.checkIns||[]; i.checkIns.push({date:todayISO(), pain:Math.max(0,Math.min(10,+pv)), note:nv});
      save(); render(); toast("Check-in saved"); }
    else if (ds.injclear){ const c=client(); const i=c.injuries.find(x=>x.id===ds.injclear); if(!i) return;
      if (confirm(`Mark "${i.label}" as cleared?`)){ i.status="cleared"; i.clearedDate=todayISO(); save(); render(); toast("Cleared — moved to history"); } }
    else if (ds.injdel){ const c=client();
      if (confirm("Delete this injury record entirely?")){ c.injuries = c.injuries.filter(x=>x.id!==ds.injdel); save(); render(); } }
    else if (ds.delrec!==undefined && ds.delrec!==""){ const c=client(); const s=[...c.recovery].sort((a,b)=>a.date.localeCompare(b.date)); const tgt=s[+ds.delrec]; c.recovery=c.recovery.filter(x=>x!==tgt); save(); render(); toast("Entry deleted"); }
    else if (ds.editsess!==undefined && ds.editsess!==""){ const c=client(); const s=c.sessions[+ds.editsess];
      if (s && s.exercises){
        draft = s.exercises.map(x=>{ const m=exMuscles(x.name); return { ...x, primary:m.p, secondary:m.s }; });
        draftDate = s.date; draftTitle = s.title || "";
        c.sessions.splice(+ds.editsess,1); rebuildClient(c); save();
        view.tab = "log"; render(); toast("Session loaded into the draft — fix it and save");
      } }
    else if (ds.delsess!==undefined && ds.delsess!==""){ const c=client();
      if (confirm("Delete this session? Fatigue and PRs will be recalculated.")){
        c.sessions.splice(+ds.delsess,1); rebuildClient(c); save(); render(); toast("Session deleted"); } }
    else if (ds.bm){ const [m,v]=ds.bm.split(":"); toast(`${m}: ${v} / 10`); }
    else if (ds.tab){ view.tab=ds.tab; render(); }
    else if (ds.del!==undefined && ds.del!==""){ draft.splice(+ds.del,1); render(); }
    else if (ds.pinnote!==undefined && ds.pinnote!==""){ const n=client().notes[+ds.pinnote]; n.pinned=!n.pinned; save(); render(); }
    else if (ds.delnote!==undefined && ds.delnote!==""){ client().notes.splice(+ds.delnote,1); save(); render(); }
    else if (ds.assign!==undefined && ds.assign!==""){ assignTarget=+ds.assign; assignSel={}; render(); }
    else if (ds.int){ const [i,k]=ds.int.split(":"); draft[+i].intensity=k; render(); }
    else if (ds.sdmode!==undefined && ds.sdmode!==""){ const it=draft[+ds.sdmode];
      it.setDetail = Array.from({length:Math.max(1, it.sets||3)}, ()=>({reps:(it.reps||"").split(/[\/,-]/)[0]||"", weight:it.weight??null}));
      normalizeItem(it); render(); }
    else if (ds.sda!==undefined && ds.sda!==""){ const it=draft[+ds.sda];
      const last=it.setDetail[it.setDetail.length-1]||{reps:"",weight:null};
      it.setDetail.push({reps:last.reps,weight:last.weight}); normalizeItem(it); render(); }
    else if (ds.sdx){ const [i,j]=ds.sdx.split(":").map(Number); const it=draft[i];
      if (it.setDetail.length>1){ it.setDetail.splice(j,1); } else { delete it.setDetail; }
      normalizeItem(it); render(); }
    else if (ds.mus){ const m=ds.mus; assignSel[m]=assignSel[m]==="p"?"s":assignSel[m]==="s"?undefined:"p"; if(!assignSel[m])delete assignSel[m]; render(); }
    else if (ds.pick!==undefined && ds.pick!==""){ const ex=E.EXERCISE_LIBRARY.concat(S.customExercises||[])[+ds.pick];
      draft.push({name:ex.name,primary:ex.p,secondary:ex.s,sets:3,reps:"",weight:null,intensity:"moderate"}); pickerOpen=false; render(); }
    else if (ds.close && e.target.classList.contains("modal-bg")){ assignTarget=null; pickerOpen=false; render(); }
    else if (ds.act){
      const a=ds.act;
      if (a==="back"){ if (draft.length && !confirm("Discard the unsaved session draft?")) return; draft=[]; draftTitle=""; view={page:"roster",clientId:null,tab:"fatigue"}; render(); }
      else if (a==="parse") parseText();
      else if (a==="picker"){ pickerOpen=true; render(); setTimeout(()=>$("#picksearch")?.focus(),50); }
      else if (a==="new-exercise"){ pickerOpen=false; assignTarget=-1; assignSel={}; view.tab="log"; render(); }
      else if (a==="save-session") saveSession();
      else if (a==="confirm-assign") confirmAssign();
      else if (a==="cancel-assign"){ assignTarget=null; render(); }
      else if (a==="save-plan"){ client().nextPlan=$("#planbox").value.trim(); save(); toast("Plan saved"); }
      else if (a==="add-note"){ const tx=$("#notebox").value.trim(); if(tx){ client().notes.unshift({date:todayISO(),text:tx}); save(); render(); } }
      else if (a==="settings") settingsMenu();
      else if (a==="client-menu") clientMenu();
      else if (a==="add-client") addClient();
      else if (a==="save-rec") saveRecovery();
      else if (a==="whoop-sync") syncWhoop();
      else if (a==="review"){ view={page:"review"}; render(); }
      else if (a==="refreshsubs"){ toast("Checking for submissions…"); fetchPending(); }
      else if (a==="add-injury"){ const c=client();
        const label = $("#injlabel").value.trim();
        const muscles = Object.keys(injSel);
        if (!label){ toast("Name the injury"); return; }
        if (!muscles.length){ toast("Tap at least one affected muscle group"); return; }
        const lo = +($("#injlo").value)||14, hi = +($("#injhi").value)||28;
        c.injuries = c.injuries||[];
        c.injuries.push({ id:"inj"+Date.now(), label, type:injForm.type, grade:injForm.grade,
          muscles, onset:$("#injonset").value||todayISO(), expLo:Math.min(lo,hi), expHi:Math.max(lo,hi),
          status:"active", checkIns:[] });
        injSel={}; save(); render(); toast(`${label} logged — it now shows on the body map and brief`); }
      else if (a==="whoop-link"){ const l = whoopConnectLink(client());
        if (l && typeof navigator !== "undefined" && navigator.clipboard) navigator.clipboard.writeText(l).then(()=>toast("Connect link copied — text it to the client")).catch(()=>prompt("Send this link to the client:", l));
        else if (l) prompt("Send this link to the client:", l); }
    }
  };
  app.oninput = e => {
    const t = e.target, ds = t.dataset;
    if (ds.sets) draft[+ds.sets].sets = Math.max(1,+t.value||1);
    else if (ds.reps) draft[+ds.reps].reps = t.value;
    else if (ds.wt) draft[+ds.wt].weight = t.value===""?null:+t.value;
    else if (ds.sdw){ const [i,j]=ds.sdw.split(":").map(Number); draft[i].setDetail[j].weight = t.value===""?null:+t.value; draft[i].weight = E.maxWeight(draft[i].setDetail); }
    else if (ds.sdr){ const [i,j]=ds.sdr.split(":").map(Number); draft[i].setDetail[j].reps = t.value; draft[i].reps = draft[i].setDetail.map(s=>s.reps||"").join("/"); }
    else if (t.id==="injtype"){ injForm.type = t.value; const [lo,hi]=injRefDays(); $("#injlo").value=lo; $("#injhi").value=hi; }
    else if (t.id==="sessdate") draftDate = t.value;
    else if (t.id==="chartsearch"){
      chartSearch = t.value;
      $("#chartlist").innerHTML = buildChartCards(client());
    }
    else if (t.id==="prsearch"){
      const q = E.normalize(t.value);
      $("#prlist").innerHTML = client().prs.filter(p=>!q || E.normalize(p.exercise).includes(q)).map(prRow).join("") || `<div class="empty">No lifts match.</div>`;
    }
    else if (t.id==="picksearch"){
      const q = E.normalize(t.value);
      const libs = E.EXERCISE_LIBRARY.concat(S.customExercises||[]);
      $("#picklist").innerHTML = libs.map((ex,i)=>({ex,i}))
        .filter(o=>!q||E.normalize(o.ex.name).includes(q)||o.ex.aliases.some(al=>al.includes(q)))
        .map(o=>`<div class="pick-item" data-pick="${o.i}">${esc(o.ex.name)}<span>${esc(o.ex.p.join(", "))}${o.ex.s.length?" · +"+esc(o.ex.s.join(", ")):""}</span></div>`).join("");
    }
  };
}

render();

</script>

if (typeof navigator !== "undefined" && "serviceWorker" in navigator && location.protocol === "https:")
  navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
